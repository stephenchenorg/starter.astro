<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>網站建置中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #f5f5f0 0%, #e8e4db 100%);
      color: #3d3d3d;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      background: #6366f1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
    }

    .logo svg {
      width: 60px;
      height: 60px;
      fill: white;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #2d2d2d;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 1.25rem;
      color: #6366f1;
      margin-bottom: 2rem;
      font-weight: 500;
    }

    .description {
      font-size: 1rem;
      line-height: 1.8;
      color: #5a5a5a;
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #6366f1;
      margin: 2rem auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 2rem;
      font-size: 0.9rem;
      color: #6366f1;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #999;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .description {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>

    <h1>即將上線</h1>
    <p class="subtitle">Coming Soon</p>

    <div class="divider"></div>

    <p class="description">
      我們正在精心打造全新的網站體驗，<br>
      敬請期待。
    </p>

    <div class="status">
      網站建置中
    </div>

    <p class="footer">
      &copy; 2025 All Rights Reserved
    </p>
  </div>
</body>
</html>
